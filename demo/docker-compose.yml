version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: splitwise-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:splitwisedb;DB_CLOSE_DELAY=-1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

# Note: H2 is in-memory, so no separate DB container needed.
# To switch to PostgreSQL, add a db service here and update application.properties.
